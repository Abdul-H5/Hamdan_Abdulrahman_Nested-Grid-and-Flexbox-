<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger Blast - Fast Food</title>
    <link rel="stylesheet" href="css/grid.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <header class="visually-hidden">
        <h1>Burger Blast Homepage</h1>
    </header>

    <main>
        
        <section class="hero-section">
            <div class="grid-con">
                <div class="hero-text col-span-4 m-col-span-6 l-col-span-6">
                    <h2>The Ultimate Burger Experience</h2>
                    <p>Juicy, flame-grilled burgers made fresh to order. Taste the difference today!</p>
                    
                    <div class="nested-perks-grid">
                        <div class="perk-box">
                            <h3>100%</h3>
                            <p>Real Beef</p>
                        </div>
                        <div class="perk-box">
                            <h3>24/7</h3>
                            <p>Delivery</p>
                        </div>
                    </div>

                    <a href="#" class="order-btn">Order Now</a>
                </div>

                <div class="hero-image col-span-4 m-col-span-6 l-col-span-6">
    
                    <picture>
                        <!-- Desktop Image -->
                        <source media="(min-width: 1200px)" srcset="images/burger-desktop.jpg">
                        <!-- Tablet Image -->
                        <source media="(min-width: 768px)" srcset="images/burger-tablet.jpg">
                        <!-- Mobile Image (Default) -->
                        <img src="images/burger-mobile.jpg" alt="A delicious double cheeseburger">
                    </picture>

                </div>

            </div>
        </section>
    </main>
    <script src="js/main.js"></script>

</body>
</html>
